<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <filter id="pi-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="24" cy="24" r="20" fill="#e67e22" opacity="0.2" filter="url(#pi-glow)"/>
  <circle cx="24" cy="24" r="16" fill="#e67e22" opacity="0.15"/>
  <!-- Piercing arrow going through target -->
  <g transform="translate(24,24)">
    <!-- Arrow shaft -->
    <line x1="-12" y1="0" x2="14" y2="0" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polygon points="16,0 11,-3 11,3" fill="#e67e22"/>
    <!-- Target circle being pierced -->
    <circle cx="2" cy="0" r="6" fill="none" stroke="#e67e22" stroke-width="1.5" opacity="0.6"/>
    <!-- Impact lines -->
    <line x1="5" y1="-5" x2="8" y2="-8" stroke="#e67e22" stroke-width="1" opacity="0.7"/>
    <line x1="5" y1="5" x2="8" y2="8" stroke="#e67e22" stroke-width="1" opacity="0.7"/>
  </g>
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="19" fill="none" stroke="#e67e22" stroke-width="1.5" opacity="0.6"/>
</svg>

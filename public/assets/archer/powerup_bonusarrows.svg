<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <filter id="ba-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="24" cy="24" r="20" fill="#2ecc71" opacity="0.2" filter="url(#ba-glow)"/>
  <circle cx="24" cy="24" r="16" fill="#2ecc71" opacity="0.15"/>
  <!-- Bundle of arrows -->
  <g transform="translate(24,24)">
    <!-- Arrow 1 -->
    <line x1="-6" y1="-4" x2="8" y2="-4" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="10,-4 7,-6 7,-2" fill="#2ecc71"/>
    <!-- Arrow 2 -->
    <line x1="-6" y1="0" x2="8" y2="0" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="10,0 7,-2 7,2" fill="#2ecc71"/>
    <!-- Arrow 3 -->
    <line x1="-6" y1="4" x2="8" y2="4" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="10,4 7,2 7,6" fill="#2ecc71"/>
  </g>
  <!-- Plus symbol -->
  <text x="36" y="16" font-family="sans-serif" font-weight="bold" font-size="14" fill="#2ecc71" text-anchor="middle">+</text>
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="19" fill="none" stroke="#2ecc71" stroke-width="1.5" opacity="0.6"/>
</svg>

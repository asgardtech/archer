<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="wood-o" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A0522D"/>
      <stop offset="50%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#6B3410"/>
    </linearGradient>
    <filter id="orange-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Orange aura -->
  <path d="M 60 10 Q 22 20 18 48 Q 22 76 60 86" fill="none" stroke="#e67e22" stroke-width="8" stroke-linecap="round" opacity="0.3" filter="url(#orange-glow)"/>
  <!-- Bow limb -->
  <path d="M 60 16 Q 28 24 24 48 Q 28 72 60 80" fill="none" stroke="url(#wood-o)" stroke-width="5" stroke-linecap="round"/>
  <!-- Orange energy trim -->
  <path d="M 60 16 Q 28 24 24 48 Q 28 72 60 80" fill="none" stroke="#e67e22" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Bowstring -->
  <line x1="60" y1="16" x2="60" y2="80" stroke="#F0C8A0" stroke-width="1.5"/>
  <!-- Grip wrap -->
  <rect x="22" y="43" width="6" height="10" rx="1" fill="#A04000" opacity="0.9"/>
  <!-- Limb tips with orange gems -->
  <circle cx="60" cy="16" r="3" fill="#e67e22"/>
  <circle cx="60" cy="16" r="1.5" fill="#FAD7A0"/>
  <circle cx="60" cy="80" r="3" fill="#e67e22"/>
  <circle cx="60" cy="80" r="1.5" fill="#FAD7A0"/>
</svg>

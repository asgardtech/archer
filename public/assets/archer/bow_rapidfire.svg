<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="wood-y" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A0522D"/>
      <stop offset="50%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#6B3410"/>
    </linearGradient>
    <filter id="yellow-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Yellow aura -->
  <path d="M 60 10 Q 22 20 18 48 Q 22 76 60 86" fill="none" stroke="#f1c40f" stroke-width="8" stroke-linecap="round" opacity="0.3" filter="url(#yellow-glow)"/>
  <!-- Bow limb -->
  <path d="M 60 16 Q 28 24 24 48 Q 28 72 60 80" fill="none" stroke="url(#wood-y)" stroke-width="5" stroke-linecap="round"/>
  <!-- Yellow energy trim -->
  <path d="M 60 16 Q 28 24 24 48 Q 28 72 60 80" fill="none" stroke="#f1c40f" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Bowstring -->
  <line x1="60" y1="16" x2="60" y2="80" stroke="#F9E79F" stroke-width="1.5"/>
  <!-- Lightning bolt accents -->
  <path d="M 34 30 L 30 38 L 36 36 L 32 44" fill="none" stroke="#f1c40f" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M 34 56 L 30 64 L 36 62 L 32 70" fill="none" stroke="#f1c40f" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <!-- Grip wrap -->
  <rect x="22" y="43" width="6" height="10" rx="1" fill="#B7950B" opacity="0.9"/>
  <!-- Limb tips with yellow gems -->
  <circle cx="60" cy="16" r="3" fill="#f1c40f"/>
  <circle cx="60" cy="16" r="1.5" fill="#FEF9E7"/>
  <circle cx="60" cy="80" r="3" fill="#f1c40f"/>
  <circle cx="60" cy="80" r="1.5" fill="#FEF9E7"/>
</svg>

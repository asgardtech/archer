<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 16" width="64" height="16">
  <defs>
    <filter id="tip-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Shaft -->
  <line x1="8" y1="8" x2="52" y2="8" stroke="#8B5E3C" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Orange glow on tip -->
  <polygon points="58,8 48,3 48,13" fill="#e67e22" opacity="0.4" filter="url(#tip-glow)"/>
  <!-- Arrowhead - orange tipped -->
  <polygon points="56,8 48,4 48,12" fill="#e67e22" stroke="#A04000" stroke-width="0.5"/>
  <!-- Orange energy line along shaft -->
  <line x1="20" y1="8" x2="50" y2="8" stroke="#e67e22" stroke-width="1" opacity="0.5"/>
  <!-- Fletching -->
  <polygon points="8,8 14,4 12,8 14,12" fill="#e67e22" stroke="#A04000" stroke-width="0.5"/>
  <!-- Nock -->
  <circle cx="7" cy="8" r="1.5" fill="#A04000"/>
</svg>

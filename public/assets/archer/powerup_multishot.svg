<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <filter id="ms-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="24" cy="24" r="20" fill="#3498db" opacity="0.2" filter="url(#ms-glow)"/>
  <circle cx="24" cy="24" r="16" fill="#3498db" opacity="0.15"/>
  <!-- Three arrows spreading out -->
  <g transform="translate(24,24)">
    <!-- Center arrow -->
    <line x1="-8" y1="0" x2="10" y2="0" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
    <polygon points="12,0 8,-2.5 8,2.5" fill="#3498db"/>
    <!-- Top arrow -->
    <line x1="-6" y1="-2" x2="8" y2="-7" stroke="#2C3E50" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="10,-7.5 6,-8 7,-4.5" fill="#3498db"/>
    <!-- Bottom arrow -->
    <line x1="-6" y1="2" x2="8" y2="7" stroke="#2C3E50" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="10,7.5 6,8 7,4.5" fill="#3498db"/>
  </g>
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="19" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.6"/>
</svg>

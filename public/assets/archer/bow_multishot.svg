<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="wood-b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A0522D"/>
      <stop offset="50%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#6B3410"/>
    </linearGradient>
    <filter id="blue-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Blue aura -->
  <path d="M 60 10 Q 22 20 18 48 Q 22 76 60 86" fill="none" stroke="#3498db" stroke-width="8" stroke-linecap="round" opacity="0.3" filter="url(#blue-glow)"/>
  <!-- Bow limb -->
  <path d="M 60 16 Q 28 24 24 48 Q 28 72 60 80" fill="none" stroke="url(#wood-b)" stroke-width="5" stroke-linecap="round"/>
  <!-- Blue energy trim -->
  <path d="M 60 16 Q 28 24 24 48 Q 28 72 60 80" fill="none" stroke="#3498db" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Bowstring -->
  <line x1="60" y1="16" x2="60" y2="80" stroke="#8EC8F0" stroke-width="1.5"/>
  <!-- Grip wrap -->
  <rect x="22" y="43" width="6" height="10" rx="1" fill="#2471A3" opacity="0.9"/>
  <!-- Limb tips with blue gems -->
  <circle cx="60" cy="16" r="3" fill="#3498db"/>
  <circle cx="60" cy="16" r="1.5" fill="#AED6F1"/>
  <circle cx="60" cy="80" r="3" fill="#3498db"/>
  <circle cx="60" cy="80" r="1.5" fill="#AED6F1"/>
</svg>

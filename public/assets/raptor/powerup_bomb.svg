<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <radialGradient id="bomb_body" cx="0.4" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#5D6D7E"/>
      <stop offset="60%" stop-color="#2C3E50"/>
      <stop offset="100%" stop-color="#1B2631"/>
    </radialGradient>
    <radialGradient id="bomb_glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E74C3C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C0392B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spark_glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F9E79F"/>
      <stop offset="50%" stop-color="#F39C12"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Ambient glow -->
  <circle cx="12" cy="13" r="11" fill="url(#bomb_glow)"/>
  <!-- Bomb body -->
  <circle cx="12" cy="14" r="7" fill="url(#bomb_body)" stroke="#E74C3C" stroke-width="0.6"/>
  <!-- Highlight -->
  <ellipse cx="10" cy="12" rx="2.5" ry="1.8" fill="#FFFFFF" opacity="0.12"/>
  <!-- Fuse stem -->
  <rect x="11" y="5" width="2" height="3" rx="0.5" ry="0.5" fill="#808B96" stroke="#616A6B" stroke-width="0.3"/>
  <!-- Fuse line -->
  <path d="M12,5 Q14,3 13,1.5" fill="none" stroke="#A6ACAF" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Spark -->
  <circle cx="13" cy="1.5" r="1.8" fill="url(#spark_glow)"/>
  <circle cx="13" cy="1.5" r="0.6" fill="#FEF9E7"/>
  <!-- Red band -->
  <ellipse cx="12" cy="14" rx="7" ry="1.2" fill="none" stroke="#E74C3C" stroke-width="0.8" opacity="0.7"/>
  <!-- Skull icon on body -->
  <circle cx="12" cy="13.5" r="1.8" fill="#E74C3C" opacity="0.6"/>
  <text x="12" y="14.2" text-anchor="middle" font-size="3" fill="#FFFFFF" font-family="sans-serif" font-weight="bold">B</text>
</svg>

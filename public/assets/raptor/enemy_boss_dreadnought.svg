<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 68">
  <defs>
    <linearGradient id="dHull" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#993355"/>
      <stop offset="50%" stop-color="#882244"/>
      <stop offset="100%" stop-color="#661133"/>
    </linearGradient>
    <radialGradient id="dAura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="60%" stop-color="#882244" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#882244" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dCockpit" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#dd6688"/>
      <stop offset="60%" stop-color="#aa4466"/>
      <stop offset="100%" stop-color="#882244"/>
    </radialGradient>
    <filter id="dGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Aura glow -->
  <ellipse cx="40" cy="34" rx="52" ry="44" fill="url(#dAura)"/>
  <!-- Main hull  massive angular dreadnought -->
  <polygon
    points="40,68 26,54.4 0,37.4 0,23.8 20,0 60,0 80,23.8 80,37.4 54,54.4"
    fill="url(#dHull)" stroke="#aa3366" stroke-width="2"/>
  <!-- Armor panel lines -->
  <line x1="12" y1="30.6" x2="68" y2="30.6" stroke="#773355" stroke-width="1" opacity="0.7"/>
  <line x1="16" y1="44.2" x2="64" y2="44.2" stroke="#773355" stroke-width="1" opacity="0.7"/>
  <!-- Left missile pod -->
  <rect x="0" y="28.9" width="7" height="14" rx="1" fill="#663344"/>
  <rect x="1" y="30.6" width="2" height="2" fill="#441122"/>
  <rect x="1" y="34.6" width="2" height="2" fill="#441122"/>
  <rect x="1" y="38.6" width="2" height="2" fill="#441122"/>
  <!-- Right missile pod -->
  <rect x="73" y="28.9" width="7" height="14" rx="1" fill="#663344"/>
  <rect x="77" y="30.6" width="2" height="2" fill="#441122"/>
  <rect x="77" y="34.6" width="2" height="2" fill="#441122"/>
  <rect x="77" y="38.6" width="2" height="2" fill="#441122"/>
  <!-- Hull ridge detail -->
  <line x1="20" y1="0" x2="40" y2="15" stroke="#993355" stroke-width="0.8" opacity="0.5"/>
  <line x1="60" y1="0" x2="40" y2="15" stroke="#993355" stroke-width="0.8" opacity="0.5"/>
  <!-- Central cockpit / bridge -->
  <circle cx="40" cy="28.9" r="7" fill="url(#dCockpit)" filter="url(#dGlow)"/>
  <circle cx="40" cy="27" r="3" fill="#cc7799" opacity="0.6"/>
</svg>

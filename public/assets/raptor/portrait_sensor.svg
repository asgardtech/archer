<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <radialGradient id="sr_glow" cx="0.5" cy="0.5" r="0.35">
      <stop offset="0%" stop-color="rgba(80,200,60,0.15)"/>
      <stop offset="100%" stop-color="rgba(80,200,60,0)"/>
    </radialGradient>
    <linearGradient id="sr_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1018"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </linearGradient>
  </defs>
  <rect width="100" height="120" fill="url(#sr_bg)"/>
  <!-- Scanline overlay -->
  <g opacity="0.08">
    <line x1="0" y1="3" x2="100" y2="3" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="9" x2="100" y2="9" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="15" x2="100" y2="15" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="21" x2="100" y2="21" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="27" x2="100" y2="27" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="33" x2="100" y2="33" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="39" x2="100" y2="39" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="45" x2="100" y2="45" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="51" x2="100" y2="51" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="57" x2="100" y2="57" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="63" x2="100" y2="63" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="69" x2="100" y2="69" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="75" x2="100" y2="75" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="81" x2="100" y2="81" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="87" x2="100" y2="87" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="93" x2="100" y2="93" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="99" x2="100" y2="99" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="105" x2="100" y2="105" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="111" x2="100" y2="111" stroke="#406030" stroke-width="1"/>
    <line x1="0" y1="117" x2="100" y2="117" stroke="#406030" stroke-width="1"/>
  </g>
  <!-- Radar glow -->
  <circle cx="50" cy="60" r="30" fill="url(#sr_glow)"/>
  <!-- Concentric rings -->
  <circle cx="50" cy="60" r="10" fill="none" stroke="rgba(80,200,60,0.25)" stroke-width="1"/>
  <circle cx="50" cy="60" r="20" fill="none" stroke="rgba(80,200,60,0.25)" stroke-width="1"/>
  <circle cx="50" cy="60" r="30" fill="none" stroke="rgba(80,200,60,0.25)" stroke-width="1"/>
  <!-- Crosshairs -->
  <line x1="18" y1="60" x2="82" y2="60" stroke="rgba(80,200,60,0.2)" stroke-width="0.5"/>
  <line x1="50" y1="22" x2="50" y2="98" stroke="rgba(80,200,60,0.2)" stroke-width="0.5"/>
  <!-- Sweep line (static, at ~45°) -->
  <line x1="50" y1="60" x2="71.2" y2="38.8" stroke="rgba(100,255,80,0.6)" stroke-width="1.5"/>
  <!-- Sweep trail -->
  <path d="M50,60 L71.2,38.8 A30,30 0 0,0 62,32" fill="rgba(80,200,60,0.12)"/>
  <!-- Radar blips -->
  <circle cx="62" cy="52" r="2" fill="rgba(100,255,80,0.7)"/>
  <circle cx="34" cy="65" r="1.5" fill="rgba(100,255,80,0.6)"/>
  <circle cx="55" cy="78" r="1.8" fill="rgba(100,255,80,0.65)"/>
  <!-- Center dot -->
  <circle cx="50" cy="60" r="2.5" fill="rgba(220,180,60,0.9)"/>
  <!-- SENSOR label -->
  <text x="50" y="14" font-family="monospace" font-weight="bold" font-size="8" fill="rgba(220,180,60,0.7)" text-anchor="middle">SENSOR</text>
  <!-- Signal strength bars -->
  <rect x="79" y="107" width="2" height="3" fill="rgba(100,255,80,0.6)"/>
  <rect x="82.5" y="104" width="2" height="6" fill="rgba(100,255,80,0.6)"/>
  <rect x="86" y="101" width="2" height="9" fill="rgba(100,255,80,0.6)"/>
  <rect x="89.5" y="98" width="2" height="12" fill="rgba(100,255,80,0.6)"/>
</svg>

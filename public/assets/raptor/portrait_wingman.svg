<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <linearGradient id="wm_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e1a"/>
      <stop offset="100%" stop-color="#121e12"/>
    </linearGradient>
    <linearGradient id="wm_suit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#344a34"/>
      <stop offset="100%" stop-color="#2a3a2a"/>
    </linearGradient>
    <linearGradient id="wm_visor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(80,200,100,0.4)"/>
      <stop offset="100%" stop-color="rgba(60,160,80,0.2)"/>
    </linearGradient>
    <linearGradient id="wm_helmet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#344a34"/>
      <stop offset="100%" stop-color="#223022"/>
    </linearGradient>
  </defs>
  <rect width="100" height="120" fill="url(#wm_bg)"/>
  <!-- Shoulders -->
  <ellipse cx="50" cy="105" rx="45" ry="25" fill="url(#wm_suit)"/>
  <!-- Collar -->
  <polygon points="35,85 65,85 60,100 40,100" fill="#223022"/>
  <!-- Shoulder patches -->
  <rect x="5" y="87" width="14" height="6" rx="2" fill="#7a9a5a"/>
  <rect x="81" y="87" width="14" height="6" rx="2" fill="#7a9a5a"/>
  <!-- Neck -->
  <ellipse cx="50" cy="83" rx="10" ry="12" fill="#c49464"/>
  <!-- Face -->
  <ellipse cx="50" cy="42" rx="28" ry="32" fill="#c49464"/>
  <!-- Jaw -->
  <ellipse cx="50" cy="47" rx="26" ry="22" fill="#c49464"/>
  <path d="M26,50 L50,72 L74,50" fill="#b08454"/>
  <ellipse cx="50" cy="47" rx="26" ry="22" fill="#c49464"/>
  <!-- Helmet shell -->
  <ellipse cx="50" cy="22" rx="34" ry="22" fill="url(#wm_helmet)"/>
  <path d="M24,18 A26,26 0 0,1 76,18" fill="#223022"/>
  <!-- Helmet rim -->
  <ellipse cx="50" cy="28" rx="32" ry="6" fill="#1a281a"/>
  <!-- Visor -->
  <path d="M26,38 A24,10 0 0,1 74,38" fill="url(#wm_visor)" stroke="rgba(80,200,100,0.45)" stroke-width="1"/>
  <!-- Eyes -->
  <ellipse cx="38" cy="40" rx="5" ry="4" fill="#f0e8d8"/>
  <ellipse cx="62" cy="40" rx="5" ry="4" fill="#f0e8d8"/>
  <circle cx="39" cy="40" r="2.5" fill="#2a4a1a"/>
  <circle cx="63" cy="40" r="2.5" fill="#2a4a1a"/>
  <!-- Eyebrows -->
  <line x1="32" y1="33.5" x2="42" y2="34.5" stroke="#3a2a1a" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="68" y1="33.5" x2="58" y2="34.5" stroke="#3a2a1a" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Oxygen mask outline -->
  <path d="M40,50 Q50,68 60,50" fill="none" stroke="#1a281a" stroke-width="2"/>
  <!-- Nose -->
  <path d="M50,44 L47,54 L53,54" fill="none" stroke="#a07a4a" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Mouth (slight grin) -->
  <path d="M41,58 Q50,61 59,58" fill="none" stroke="#7a4a2a" stroke-width="1.5"/>
  <!-- W-2 badge -->
  <rect x="40" y="93" width="20" height="10" rx="2" fill="#7a9a5a"/>
  <text x="50" y="99.5" font-family="sans-serif" font-weight="bold" font-size="6" fill="#1a281a" text-anchor="middle" dominant-baseline="middle">W-2</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 84 70">
  <defs>
    <linearGradient id="cHull" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#667755"/>
      <stop offset="50%" stop-color="#556644"/>
      <stop offset="100%" stop-color="#445533"/>
    </linearGradient>
    <radialGradient id="cAura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="60%" stop-color="#556644" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#556644" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cCockpit" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#99aa77"/>
      <stop offset="60%" stop-color="#667755"/>
      <stop offset="100%" stop-color="#556644"/>
    </radialGradient>
    <radialGradient id="cBayGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ccaa22" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ccaa22" stop-opacity="0.3"/>
    </radialGradient>
    <filter id="cGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cBayBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Aura glow -->
  <ellipse cx="42" cy="35" rx="55" ry="46" fill="url(#cAura)"/>
  <!-- Main hull  wide carrier body -->
  <polygon
    points="25.2,0 58.8,0 75.6,17.5 84,31.5 84,52.5 67.2,70 16.8,70 0,52.5 0,31.5 8.4,17.5"
    fill="url(#cHull)" stroke="#6b7a55" stroke-width="1.5"/>
  <!-- Hull panel lines -->
  <line x1="12.6" y1="28" x2="71.4" y2="28" stroke="#4a5a3a" stroke-width="1" opacity="0.7"/>
  <line x1="16.8" y1="42" x2="67.2" y2="42" stroke="#4a5a3a" stroke-width="1" opacity="0.7"/>
  <!-- Flight deck marking -->
  <rect x="30" y="22" width="24" height="30" rx="2" fill="none" stroke="#4a5a3a" stroke-width="0.7" opacity="0.5"/>
  <line x1="42" y1="22" x2="42" y2="52" stroke="#4a5a3a" stroke-width="0.5" opacity="0.4"/>
  <!-- Left hangar bay -->
  <rect x="2.2" y="36.8" width="8" height="12" rx="1" fill="#445533"/>
  <rect x="3.2" y="38" width="6" height="9" rx="1" fill="url(#cBayGlow)" filter="url(#cBayBlur)"/>
  <!-- Right hangar bay -->
  <rect x="73.8" y="36.8" width="8" height="12" rx="1" fill="#445533"/>
  <rect x="74.8" y="38" width="6" height="9" rx="1" fill="url(#cBayGlow)" filter="url(#cBayBlur)"/>
  <!-- Amber running lights -->
  <circle cx="14" cy="10" r="1.5" fill="#ccaa22" opacity="0.6"/>
  <circle cx="70" cy="10" r="1.5" fill="#ccaa22" opacity="0.6"/>
  <circle cx="8" cy="52" r="1.5" fill="#ccaa22" opacity="0.6"/>
  <circle cx="76" cy="52" r="1.5" fill="#ccaa22" opacity="0.6"/>
  <!-- Central bridge / cockpit -->
  <circle cx="42" cy="28" r="6" fill="url(#cCockpit)" filter="url(#cGlow)"/>
  <circle cx="42" cy="26.5" r="2.5" fill="#aabb88" opacity="0.6"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 60">
  <defs>
    <linearGradient id="gHull" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4466bb"/>
      <stop offset="50%" stop-color="#3355aa"/>
      <stop offset="100%" stop-color="#223388"/>
    </linearGradient>
    <radialGradient id="gAura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="60%" stop-color="#3355aa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3355aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gCockpit" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#88aaee"/>
      <stop offset="60%" stop-color="#5577cc"/>
      <stop offset="100%" stop-color="#3355aa"/>
    </radialGradient>
    <filter id="gGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Aura glow -->
  <ellipse cx="36" cy="30" rx="47" ry="39" fill="url(#gAura)"/>
  <!-- Main hull  wide flat gunship silhouette -->
  <polygon
    points="36,51 18,42 0,30 3.6,15 21.6,0 50.4,0 68.4,15 72,30 54,42"
    fill="url(#gHull)" stroke="#5577cc" stroke-width="1.5"/>
  <!-- Hull panel lines -->
  <line x1="12" y1="22" x2="60" y2="22" stroke="#2a4488" stroke-width="0.8" opacity="0.6"/>
  <line x1="18" y1="36" x2="54" y2="36" stroke="#2a4488" stroke-width="0.8" opacity="0.6"/>
  <!-- Left wing turret pod -->
  <rect x="0" y="25.5" width="8" height="10" rx="1" fill="#445566"/>
  <rect x="1" y="27" width="6" height="3" rx="0.5" fill="#5577cc" opacity="0.8"/>
  <!-- Right wing turret pod -->
  <rect x="64" y="25.5" width="8" height="10" rx="1" fill="#445566"/>
  <rect x="65" y="27" width="6" height="3" rx="0.5" fill="#5577cc" opacity="0.8"/>
  <!-- Engine glow exhausts -->
  <ellipse cx="26" cy="48" rx="3" ry="1.5" fill="#5577cc" opacity="0.5"/>
  <ellipse cx="46" cy="48" rx="3" ry="1.5" fill="#5577cc" opacity="0.5"/>
  <!-- Central cockpit -->
  <circle cx="36" cy="25.5" r="6" fill="url(#gCockpit)" filter="url(#gGlow)"/>
  <circle cx="36" cy="24" r="2.5" fill="#aaccff" opacity="0.7"/>
</svg>

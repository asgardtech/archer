  <ellipse cx="32" cy="11" rx="8" ry="15" fill="#3da87a" opacity="0.5" transform="rotate(0 32 32)"/>
  <ellipse cx="32" cy="10" rx="10" ry="17" fill="#5b4d8b" opacity="0.8" transform="rotate(45 32 32)"/>

  <path d="M0,184 Q40,180 80,182 Q120,178 160,181 Q200,176 240,179 Q280,174 320,178 Q360,173 400,176 Q440,172 480,175 Q520,170 560,174 Q600,170 640,173 Q680,176 720,172 Q760,175 800,173 L800,200 L0,200 Z"

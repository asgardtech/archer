  <path d="M32 74 L32 68" stroke="#a0c0d8" stroke-width="0.8" fill="none" opacity="0.45"/>

  <path d="M88 24 L92 20 L96 24" stroke="#a0c0d8" stroke-width="1" fill="none" opacity="0.5"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <linearGradient id="pp_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#162040"/>
      <stop offset="100%" stop-color="#0f1a2e"/>
    </linearGradient>
    <linearGradient id="pp_suit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3058"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
    <linearGradient id="pp_visor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(220,190,60,0.45)"/>
      <stop offset="100%" stop-color="rgba(180,150,40,0.25)"/>
    </linearGradient>
    <linearGradient id="pp_helmet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3058"/>
      <stop offset="100%" stop-color="#132040"/>
    </linearGradient>
  </defs>
  <rect width="100" height="120" fill="url(#pp_bg)"/>
  <!-- Shoulders -->
  <ellipse cx="50" cy="105" rx="45" ry="25" fill="url(#pp_suit)"/>
  <!-- Collar -->
  <polygon points="35,85 65,85 60,100 40,100" fill="#152240"/>
  <!-- Shoulder patches -->
  <rect x="5" y="87" width="14" height="6" rx="2" fill="#b89a4a"/>
  <rect x="81" y="87" width="14" height="6" rx="2" fill="#b89a4a"/>
  <!-- Neck -->
  <ellipse cx="50" cy="83" rx="10" ry="12" fill="#d4a574"/>
  <!-- Face -->
  <ellipse cx="50" cy="42" rx="28" ry="32" fill="#d4a574"/>
  <!-- Jaw -->
  <ellipse cx="50" cy="47" rx="26" ry="22" fill="#d4a574"/>
  <path d="M28,52 L50,74 L72,52" fill="#c89a68"/>
  <ellipse cx="50" cy="47" rx="26" ry="22" fill="#d4a574"/>
  <!-- Helmet shell -->
  <ellipse cx="50" cy="22" rx="34" ry="22" fill="url(#pp_helmet)"/>
  <path d="M24,18 A26,26 0 0,1 76,18" fill="#132040"/>
  <!-- Helmet rim -->
  <ellipse cx="50" cy="28" rx="32" ry="6" fill="#0e1830"/>
  <!-- Visor -->
  <path d="M26,38 A24,10 0 0,1 74,38" fill="url(#pp_visor)" stroke="rgba(200,170,60,0.5)" stroke-width="1"/>
  <!-- Eyes -->
  <ellipse cx="38" cy="40" rx="5" ry="4" fill="#f0e8d8"/>
  <ellipse cx="62" cy="40" rx="5" ry="4" fill="#f0e8d8"/>
  <circle cx="39" cy="40" r="2.5" fill="#1a3a6a"/>
  <circle cx="63" cy="40" r="2.5" fill="#1a3a6a"/>
  <!-- Eyebrows -->
  <line x1="32" y1="33" x2="42" y2="34.5" stroke="#4a3a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="68" y1="33" x2="58" y2="34.5" stroke="#4a3a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Oxygen mask outline -->
  <path d="M40,50 Q50,68 60,50" fill="none" stroke="#0e1830" stroke-width="2"/>
  <!-- Nose -->
  <path d="M50,44 L48,54 L52,54" fill="none" stroke="#b88a5a" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Mouth -->
  <path d="M42,59 Q50,57 58,59" fill="none" stroke="#8a5a3a" stroke-width="1.5"/>
  <!-- R-1 badge -->
  <rect x="40" y="93" width="20" height="10" rx="2" fill="#b89a4a"/>
  <text x="50" y="99.5" font-family="sans-serif" font-weight="bold" font-size="6" fill="#0e1830" text-anchor="middle" dominant-baseline="middle">R-1</text>
</svg>

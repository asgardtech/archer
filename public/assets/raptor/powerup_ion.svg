<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <radialGradient id="piCore" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#b2ebf2"/>
      <stop offset="40%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#004d40"/>
    </radialGradient>
    <radialGradient id="piGlow" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00bcd4" stop-opacity="0"/>
    </radialGradient>
    <filter id="piBlur">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="12" cy="12" r="11" fill="url(#piGlow)"/>
  <circle cx="12" cy="12" r="9" fill="none" stroke="#00bcd4" stroke-width="0.8" stroke-opacity="0.5"/>
  <circle cx="12" cy="12" r="7" fill="url(#piCore)" filter="url(#piBlur)"/>
  <circle cx="12" cy="10" r="3" fill="#b2ebf2" opacity="0.5"/>
  <text x="12" y="15" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="10" fill="#FFFFFF" opacity="0.9">I</text>
  <polyline points="5,8 7,10 5.5,12" stroke="#80deea" stroke-width="0.5" stroke-opacity="0.5" fill="none" stroke-linecap="round"/>
  <polyline points="19,8 17,10 18.5,12" stroke="#80deea" stroke-width="0.5" stroke-opacity="0.5" fill="none" stroke-linecap="round"/>
</svg>

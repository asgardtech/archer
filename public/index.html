<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Archer</title>
  <style>
    @font-face {
      font-family: 'Press Start 2P';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('./fonts/PressStart2P-Regular.woff2') format('woff2'),
           url('./fonts/PressStart2P-Regular.woff') format('woff');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      overscroll-behavior: none;
      position: fixed;
      width: 100%;
      height: 100%;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      border: 2px solid #e94560;
      border-radius: 4px;
      display: block;
      touch-action: none;
      max-width: 100vw;
      max-height: 100vh;
    }
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: linear-gradient(to bottom, #050510, #0a1628);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.4s ease;
    }
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loading-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 24px;
      color: #FFFFFF;
      margin-bottom: 40px;
    }
    #loading-message {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: #8899BB;
      margin-bottom: 20px;
    }
    #loading-progress-track {
      width: 300px;
      height: 12px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      overflow: hidden;
    }
    #loading-progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 6px;
      background: linear-gradient(to right, #3498db, #2ecc71);
      transition: width 0.15s ease;
    }
    #loading-percent {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #667799;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div id="loading-title">ARCHER</div>
    <div id="loading-message">Loading assets...</div>
    <div id="loading-progress-track">
      <div id="loading-progress-fill"></div>
    </div>
    <div id="loading-percent">0%</div>
  </div>
  <canvas id="game-canvas"></canvas>
</body>
</html>

name: Release to Steam

on:
  workflow_dispatch:
    inputs:
      version:
        description: >
          Semver version to release (e.g., "1.2.3").
          If provided, bumps package.json, commits, and creates a git tag v{version}.
          If omitted, builds with the current package.json version.
        required: false
        default: ""
        type: string
      steam_branch:
        description: >
          Steam branch to set the build live on after upload
          (e.g., "staging", "beta", "default" for production)
        required: true
        default: staging
        type: string
      description:
        description: >
          Build description shown in the Steamworks dashboard
          (leave empty for default)
        required: false
        default: ""
        type: string

concurrency:
  group: steam-release
  cancel-in-progress: false

jobs:
  version-bump:
    if: inputs.version != ''
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.push.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '$VERSION'. Must be MAJOR.MINOR.PATCH (e.g., 1.2.3)"
            exit 1
          fi

      - name: Check tag does not already exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "::error::Tag v${VERSION} already exists"
            exit 1
          fi

      - name: Bump version in package.json
        env:
          VERSION: ${{ inputs.version }}
        run: npm version "$VERSION" --no-git-tag-version

      - name: Commit and tag
        id: push
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD --tags
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: version-bump
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ needs.version-bump.outputs.sha || '' }}

  upload-to-steam:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build-windows
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: build-macos
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: build-linux
          path: release/

      - name: Validate artifact directories
        run: |
          missing=0
          for dir in release/win-unpacked release/mac-arm64 release/linux-unpacked; do
            if [ ! -d "$dir" ]; then
              echo "::error::Required directory $dir is missing"
              missing=1
            else
              echo "✓ $dir exists ($(find "$dir" -type f | wc -l) files)"
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Configure app_build.vdf
        env:
          VERSION: ${{ inputs.version }}
          DESC: ${{ inputs.description }}
          STEAM_BRANCH: ${{ inputs.steam_branch }}
        run: |
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          if [ -z "$DESC" ]; then
            DESC="v${VERSION}"
          fi
          sed -i "s|\"Desc\".*|\"Desc\" \"${DESC}\"|" steamcmd/app_build.vdf
          if [ -n "$STEAM_BRANCH" ]; then
            sed -i '/"Desc"/a\  "SetLive" "'"$STEAM_BRANCH"'"' steamcmd/app_build.vdf
          fi
          echo "--- Final app_build.vdf ---"
          cat steamcmd/app_build.vdf

      - name: Install SteamCMD
        uses: CyberAndrii/setup-steamcmd@v1

      - name: Write Steam config.vdf
        run: |
          mkdir -p ~/Steam/config
          echo "${{ secrets.STEAM_CONFIG_VDF }}" | base64 -d > ~/Steam/config/config.vdf
          echo "::add-mask::$(cat ~/Steam/config/config.vdf)"

      - name: Upload to Steam via SteamCMD
        run: |
          steamcmd +login ${{ secrets.STEAM_USERNAME }} \
                   +run_app_build "${{ github.workspace }}/steamcmd/app_build.vdf" \
                   +quit

      - name: Upload SteamCMD build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: steam-build-logs
          path: steam_build_output/
          retention-days: 14
          if-no-files-found: warn
